<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>텍스트 추출기 - 고정확도 OCR</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>📸 텍스트 추출기</h1>
            <p>Google Cloud Vision API를 사용한 고정확도 텍스트 인식</p>
        </header>

        <main>
            <div class="upload-section">
                <div class="upload-area" id="uploadArea">
                    <div class="upload-content">
                        <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                            <polyline points="17 8 12 3 7 8"></polyline>
                            <line x1="12" y1="3" x2="12" y2="15"></line>
                        </svg>
                        <p>이미지를 드래그하거나 클릭하여 업로드</p>
                        <p class="upload-hint">여러 장 선택 가능 · JPG/PNG/GIF</p>
                    </div>
                    <input type="file" id="fileInput" accept="image/*" multiple hidden>
                </div>
            </div>

            <div class="preview-section" id="previewSection" style="display: none;">
                <h2>업로드된 이미지</h2>
                <div class="image-preview">
                    <img id="previewImage" alt="미리보기">
                </div>
                <div class="file-list" id="fileList"></div>
                <div class="ocr-options">
                    <label class="option-label">
                        <input type="radio" name="ocrMethod" value="google" checked>
                        <span>Google Cloud Vision API (고정확도)</span>
                    </label>
                    <label class="option-label">
                        <input type="radio" name="ocrMethod" value="tesseract">
                        <span>Tesseract.js (로컬 처리)</span>
                    </label>
                    <div class="select-row">
                        <label for="visionMode">인식 모드</label>
                        <select id="visionMode">
                            <option value="DOCUMENT_TEXT_DETECTION" selected>문서 모드 (스캔/PDF)</option>
                            <option value="TEXT_DETECTION">자연/장면 모드 (간판/사진)</option>
                        </select>
                    </div>
                    <div class="select-row">
                        <label for="visionLang">언어 힌트</label>
                        <select id="visionLang">
                            <option value="ko+en" selected>한국어 + 영어</option>
                            <option value="ko">한국어</option>
                            <option value="en">영어</option>
                        </select>
                    </div>
                </div>
                <button class="btn btn-primary" id="extractBtn">텍스트 추출하기</button>
                <button class="btn btn-secondary" id="resetBtn">다시 선택</button>
            </div>

            <div class="loading-section" id="loadingSection" style="display: none;">
                <div class="spinner"></div>
                <p id="loadingText">텍스트를 추출하는 중...</p>
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
            </div>

            <div class="result-section" id="resultSection" style="display: none;">
                <h2>추출된 텍스트</h2>
                <div class="method-badge" id="methodBadge"></div>
                <div class="result-box">
                    <textarea id="resultText"></textarea>
                    <div class="result-actions">
                        <button class="btn btn-fix" id="fixBtn">자동 수정</button>
                        <button class="btn btn-copy" id="copyBtn">복사하기</button>
                        <button class="btn btn-download" id="downloadBtn">다운로드</button>
                    </div>
                </div>
            </div>
        </main>

        <footer>
            <p>Powered by Google Cloud Vision API & Tesseract.js</p>
        </footer>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@4.1.1/dist/tesseract.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
